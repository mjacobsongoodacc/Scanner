[build]
  publish = "dist"
  command = "npm run build"

# Kalshi proxy — path+query encoded in ?path= param (order matters)
[[redirects]]
  from = "/kalshi-api"
  to = "/.netlify/functions/kalshi-proxy"
  status = 200
  force = true

[[redirects]]
  from = "/kalshi-api/*"
  to = "/.netlify/functions/kalshi-proxy?path=/:splat"
  status = 200
  force = true

# SPA fallback - must be last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
